## SELLER

### Seller — Residential

#### Common Questions

##### About the Sale
- Why is the owner selling the property?
- What is included in the sale, and is anything excluded?
- Is any furniture or staging negotiable?
- How flexible is the timing for closing or possession?
- Would the owner consider a short post-closing leaseback?
- Are there any known issues or disclosures the owner has shared?
- Are there planned developments, road projects, or zoning changes nearby?
- Is the property being sold as-is, or is the owner open to repairs based on inspection?
- Has the owner indicated openness to concessions or credits?

##### Selling Story & Appeal &nbsp;<strong class="new">✚ NEW subsection</strong>
- <strong class="new">✚ NEW</strong> What first made you fall in love with this home, or what will you miss most about living here?
- <strong class="new">✚ NEW</strong> What do guests or visitors compliment most about this property?
- <strong class="new">✚ NEW</strong> Is there a particular time of day, season, or moment when the property shows at its best?
- <strong class="new">✚ NEW</strong> What type of lifestyle or everyday living do you think this property is especially well suited for?
- <strong class="new">✚ NEW</strong> If the property has been shown before, what feedback, compliments, or hesitations have buyers or agents shared?

##### Property Condition & Systems
- How old is the roof, and what condition is it in?
- How old is the HVAC system, and when was it last serviced?
- How old is the water heater, and what type is it?
- What renovations or upgrades have been made, and when?
- Were renovations completed with proper permits?
- Are there any known foundation or structural issues?
- Any pest or termite history, and how was it resolved?
- Has the property ever flooded or had water damage?
- Any mold history, and how was it addressed?
- Are solar panels present, and are they owned or leased?
- Are there smart-home or EV-charging features?
- If there is a pool or spa, how old is the equipment and what is its condition?

##### Costs & Utilities
- What are the average monthly utility costs?
- Which internet/utility providers serve the property, and what speeds are available?
- Has the owner disclosed any insurance claims history for the property?

##### Space & Light
- What storage options are available?
- How is the natural light, and which way does the home face?

##### Location & Neighborhood
- What can you share about the area's setting and nearby amenities?
- Are there notable traffic or noise considerations nearby?
- <strong class="rw">✏️ REWRITTEN</strong> Are there commute or access details a buyer wouldn't discover on a map — a favorite route, a quick highway on-ramp, walkable errands?
- <strong class="rm">✗ REMOVED</strong> <del>Which school district is this property assigned to?</del> *(now answered by Location DNA / Census TIGER)*

#### AI Insights

##### Property Insights
- What features make this property stand out?
- <strong class="rw">✏️ REWRITTEN</strong> Beyond what a map shows, what do you personally love about this location — the neighbors, the street, the daily routine here?
- What lifestyle does this property appear to support?
- What property information has been disclosed?
- What property features may appeal to different buyers?

#### Common Questions

##### Buyer Background
- What's driving the buyer's search right now?

- What's on the buyer's wish list (nice-to-haves)?
- Does the buyer need any accessibility features?
- What are the buyer's privacy preferences?

## LANDLORD

### Landlord — Residential

#### Common Questions

##### Tenancy & Maintenance
- How are maintenance requests handled, including emergencies and response times?
- Are there planned renovations or construction that could affect tenants?
- How much notice is required to vacate at lease end?
- Is a lease-to-own or rent-credit arrangement possible?

##### Systems & Amenities
- Which internet providers and speeds are available?
- Is the unit furnished, unfurnished, or negotiable?
- Is EV charging available or installable?

##### Policies & Costs
- Are short-term rentals permitted?
- Any pest or mold history, and how was it resolved?
- How are utilities metered and billed?
- Is renter's insurance required, and at what coverage?
- What's the application process, fee, and timeline?
- Who is responsible for lawn/landscaping?
- According to the landlord, what is the typical length of tenancy?

##### Location & Neighborhood
- What can you share about the area's setting and nearby amenities?
- What's the noise level like?
- How close is public transit?
- Is guest/visitor parking available?
- <strong class="rm">✗ REMOVED</strong> <del>Which school district serves this rental?</del> *(now answered by Location DNA / Census TIGER)*

##### Management & Fit &nbsp;<strong class="new">✚ NEW subsection</strong>
- <strong class="new">✚ NEW</strong> How hands-on is the landlord — self-managed or professionally managed — and what's their communication style with tenants?
- <strong class="new">✚ NEW</strong> What features or characteristics make this rental especially enjoyable for the right tenant?

## TENANT

### Tenant — Residential

#### Common Questions

##### Applicant Background
- What's driving the applicant's rental search?
- What's the applicant's biggest concern in this search? 🔒
- Is there any chance the applicant would need to break the lease early? 🔒
- Does the applicant have landlord or employer references available? 🔒

##### Residential Applicant
- What is the source and stability of the applicant's income? 🔒
- Would the applicant consider a longer lease for a locked-in/reduced rate?
- Is the applicant willing to pay a pet deposit or pet rent if required?
- How long was the most recent tenancy, and why is the applicant moving? 🔒
- How flexible is the applicant on lease length?
- Is a co-signer or guarantor available if needed? 🔒
- How soon is the applicant ready to apply and provide documentation? 🔒
- Has the applicant disclosed any prior rental conduct (late payments, notices)? 🔒

##### Lifestyle & Fit &nbsp;<strong class="new">✚ NEW subsection</strong>
- <strong class="new">✚ NEW</strong> Does the applicant work remotely, on-site, hybrid, or have other space needs that should be considered?
- <strong class="new">✚ NEW</strong> What locations does the applicant need to be near (work, school, family), and how important is commute?
- <strong class="new">✚ NEW</strong> Beyond the criteria already captured, what are the applicant's absolute deal-breakers in a rental?
