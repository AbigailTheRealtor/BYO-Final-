; Batch C (launch-audit #6/#7) — upload limits for the request-handling PHP process.
;
; WHY THIS FILE EXISTS
; The app is served by `php artisan serve` (PHP built-in `cli-server` SAPI), not
; nginx/FPM. That SAPI does NOT read `.user.ini`, and Laravel 8's ServeCommand
; spawns its `php -S` worker WITHOUT forwarding the `-d` flags set in `.replit`.
; Result: real uploads ran at PHP's compiled defaults (post_max_size=8M,
; upload_max_filesize=2M, max_file_uploads=20) — which silently dropped any
; multi-photo batch (e.g. 14 JPGs sent by Livewire as one multipart POST).
;
; HOW THIS FILE IS APPLIED
; `.replit` sets PHP_INI_SCAN_DIR to this directory. ServeCommand passes the
; parent env to the `php -S` worker, and a starting PHP process scans
; PHP_INI_SCAN_DIR for extra .ini files — so these values DO reach the worker.
; (Proven: PHP_INI_SCAN_DIR=deploy/php makes the worker report these values.)
;
; DEPLOYMENT NOTE (not applied from here): a future nginx/Apache front-end must
; also set `client_max_body_size` >= post_max_size. Verify the Replit edge proxy
; does not impose a smaller body cap.

upload_max_filesize=50M
post_max_size=150M
max_file_uploads=50
memory_limit=512M
max_execution_time=120
max_input_time=120
