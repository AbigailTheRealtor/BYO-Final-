name: No Backup Files

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-backup-files:
    name: Reject backup files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Handle first push to a branch (before SHA is all zeros)
          # --diff-filter=ACMR: Added, Copied, Modified, Renamed — excludes Deletions
          if echo "$BASE" | grep -qE '^0+$'; then
            FILES=$(git diff-tree --no-commit-id -r --name-only --diff-filter=ACMR "$HEAD")
          else
            FILES=$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD")
          fi

          echo "Changed files:"
          echo "$FILES"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check for backup files in changed files
        run: |
          DIRS="app resources public database"
          BAK_PATTERN='\.(bak|bak_.+)$| copy(\.[^/]+)?$'

          found=()

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            in_scope=false
            for dir in $DIRS; do
              case "$file" in
                "$dir"/*) in_scope=true; break ;;
              esac
            done
            $in_scope || continue

            if echo "$file" | grep -qiE "$BAK_PATTERN"; then
              found+=("$file")
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          if [ ${#found[@]} -gt 0 ]; then
            echo ""
            echo "ERROR: Backup files detected in this commit/PR:"
            echo ""
            for f in "${found[@]}"; do
              echo "  $f"
            done
            echo ""
            echo "Please remove or rename these files before merging."
            echo "Backup files (*.bak, *.bak_*, '* copy.*') must not be committed."
            exit 1
          fi

          echo "No backup files found in changed files. All clear."
